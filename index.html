// ===== STAR BACKGROUND =====
function createStars() {
  const c = document.getElementById('stars');
  c.innerHTML = '';
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.setProperty('--dur', (2 + Math.random() * 4) + 's');
    s.style.animationDelay = Math.random() * 3 + 's';
    c.appendChild(s);
  }
}

}

function setAccounts(accounts) {
  localStorage.setItem('fq_accounts', JSON.stringify(accounts));
}

function getUserKey(user) {
  return `fq_saved_${user}`;
}

function loadProgress() {
  if (!currentUser) return;
  try {
    const d = localStorage.getItem(getUserKey(currentUser));
    if (d) {
      const p = JSON.parse(d);
      currentLevel = Math.min(p.currentLevel || 1, 31);
      totalStars = p.totalStars || 0;
      levelStars = p.levelStars || {};
      return;
    }
  } catch(e) {}

  // Default starter progress
  currentLevel = 1;
  totalStars = 0;
  levelStars = {};
}

function saveProgress() {
  if (!currentUser) return;
  try {
    localStorage.setItem(getUserKey(currentUser), JSON.stringify({ currentLevel, totalStars, levelStars }));
  } catch(e) {}
}

function saveCurrentUser() {
  if (currentUser) localStorage.setItem('fq_user', currentUser);
  else localStorage.removeItem('fq_user');
}

function initAuth() {
  const stored = localStorage.getItem('fq_user');
  if (stored) {
    const accounts = getAccounts();
    if (accounts[stored]) {
      currentUser = stored;
      setAuthStatus();
      loadProgress();
      continueToGame();
      return;
    }
  }
  openAuthModal('login');
}

function setAuthStatus() {
  const userInfo = document.getElementById('userInfo');
  if (currentUser) {
    userInfo.textContent = `مرحباً، ${currentUser}`;
    document.getElementById('logoutBtn').style.display = 'inline-flex';
  } else {
    userInfo.textContent = 'غير مسجل • الرجاء تسجيل الدخول';
    document.getElementById('logoutBtn').style.display = 'none';
  }
}

function openAuthModal(mode = 'login') {
  authMode = mode;
  const authModal = document.getElementById('authModal');
  const openBtn = document.getElementById('authSubmit');
  const msg = document.getElementById('authMessage');
  authModal.classList.add('active');
  document.getElementById('authLoginTab').style.background = mode === 'login' ? 'rgba(0,255,200,0.15)' : 'rgba(100,100,160,0.2)';
  document.getElementById('authRegisterTab').style.background = mode === 'register' ? 'rgba(0,255,200,0.15)' : 'rgba(100,100,160,0.2)';
  msg.textContent = '';
  renderAuthForm();
  openBtn.textContent = mode === 'login' ? 'دخول' : 'تسجيل';
}

function closeAuthModal() {
  document.getElementById('authModal').classList.remove('active');
}

function renderAuthForm() {
  const area = document.getElementById('authFormArea');
  area.innerHTML = `
    <label class="block text-right mb-2" style="color:#c8c8e0;">اسم المستخدم</label>
    <input id="authUsername" class="w-full p-3 rounded-lg" style="background:rgba(20,20,50,0.9);border:1px solid rgba(100,100,160,0.3);color:#c8c8e0;" />
    <label class="block text-right mt-3 mb-2" style="color:#c8c8e0;">كلمة المرور</label>
    <input id="authPassword" type="password" class="w-full p-3 rounded-lg" style="background:rgba(20,20,50,0.9);border:1px solid rgba(100,100,160,0.3);color:#c8c8e0;" />
  `;
}

function loginUser() {
  const user = document.getElementById('authUsername').value.trim();
  const pass = document.getElementById('authPassword').value;
  const msg = document.getElementById('authMessage');
  if (!user || !pass) { msg.textContent = 'يرجى ملء الحقلين'; return; }
  const accounts = getAccounts();
  if (!accounts[user] || accounts[user].password !== pass) { msg.textContent = 'اسم المستخدم أو كلمة المرور غير صحيحة'; return; }
  currentUser = user;
  saveCurrentUser();
  setAuthStatus();
  loadProgress();
  closeAuthModal();
  continueToGame();
  showToast('تم تسجيل الدخول بنجاح', 'success');
}

function registerUser() {
  const user = document.getElementById('authUsername').value.trim();
  const pass = document.getElementById('authPassword').value;
  const msg = document.getElementById('authMessage');
  if (!user || !pass) { msg.textContent = 'يرجى ملء الحقلين'; return; }
  const accounts = getAccounts();
  if (accounts[user]) { msg.textContent = 'اسم المستخدم موجود بالفعل'; return; }
  accounts[user] = { password: pass };
  setAccounts(accounts);
  currentUser = user;
  saveCurrentUser();
  setAuthStatus();
  currentLevel = 1;
  totalStars = 0;
  levelStars = {};
  saveProgress();
  closeAuthModal();
  continueToGame();
  showToast('تم إنشاء الحساب وتسجيل الدخول', 'success');
}

function logoutUser() {
  currentUser = null;
  saveCurrentUser();
  setAuthStatus();
  openAuthModal('login');
}

function continueToGame() {
  renderMap();
  if (currentLevel > 30) {
    showCelebration();
  }
  setTimeout(() => scrollToCurrentLevel(), 300);
}

// ===== MAP GENERATION =====
function generateNodePositions() {
  const positions = [];
  const rows = 10;
  const nodesPerRow = 3;
  const yStart = 60;
  const ySpacing = 150;
  
  for (let r = 0; r < rows; r++) {
    for (let n = 0; n < nodesPerRow; n++) {
      const idx = r * nodesPerRow + n;
      if (idx >= 30) break;
      const xBase = (n + 1) / (nodesPerRow + 1) * 100;
      const xOffset = (r % 2 === 0 ? 1 : -1) * (n === 1 ? 0 : 5);
      positions.push({
        x: xBase + xOffset,
        y: yStart + r * ySpacing
      });
    }
  }
  return positions;
}

function renderMap() {
  const container = document.getElementById('mapContainer');
  const svg = document.getElementById('pathSvg');
  const positions = generateNodePositions();
  
  // Set container height
  const maxY = Math.max(...positions.map(p => p.y));
  container.style.minHeight = (maxY + 120) + 'px';
  svg.style.height = (maxY + 120) + 'px';
  
  // Clear
  container.innerHTML = '';
  svg.innerHTML = '';
  
  // Draw paths
  for (let i = 0; i < positions.length - 1; i++) {
    const from = positions[i];
    const to = positions[i + 1];
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', from.x + '%');
    line.setAttribute('y1', from.y);
    line.setAttribute('x2', to.x + '%');
    line.setAttribute('y2', to.y);
    line.setAttribute('class', i < currentLevel - 1 ? 'path-line-active' : 'path-line');
    svg.appendChild(line);
  }
  
  // Draw nodes
  positions.forEach((pos, idx) => {
    const lvl = idx + 1;
    const ch = challenges[idx];
    const node = document.createElement('div');
    const isFinal = lvl === 30;
    
    let stateClass = 'locked';
    if (lvl < currentLevel) stateClass = 'completed';
    else if (lvl === currentLevel) stateClass = 'current';
    
    node.className = `map-node ${stateClass} ${isFinal ? 'final-gate' : ''}`;
    node.style.left = `calc(${pos.x}% - ${isFinal ? 32 : 24}px)`;
    node.style.top = pos.y + 'px';
    
    if (stateClass === 'completed') {
      node.innerHTML = `<span style="font-size:18px;">✓</span>`;
    } else if (isFinal && stateClass !== 'locked') {
      node.innerHTML = `<span style="font-size:20px;">🚀</span>`;
    } else if (isFinal) {
      node.innerHTML = `<span style="font-size:16px;opacity:0.3;">🔒</span>`;
    } else {
      node.innerHTML = `<span>${ch.icon}</span>`;
    }
    
    // Tooltip
    const diffLabel = lvl <= 10 ? 'سهل' : lvl <= 20 ? 'متوسط' : 'صعب';
    const diffClass = lvl <= 10 ? 'badge-easy' : lvl <= 20 ? 'badge-medium' : 'badge-hard';
    
    const tooltip = document.createElement('div');
    tooltip.className = 'absolute text-center pointer-events-none';
    tooltip.style.cssText = 'bottom:-32px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:11px;';
    
    const starStr = levelStars[lvl] ? '⭐'.repeat(levelStars[lvl]) : '';
    tooltip.innerHTML = `<span class="${diffClass}" style="font-weight:600;">${ch.cat}</span>${starStr ? '<br>' + starStr : ''}`;
    node.appendChild(tooltip);
    
    if (stateClass !== 'locked') {
      node.addEventListener('click', (e) => {
        if (isMapDragging) {
          e.preventDefault();
          e.stopPropagation();
          return;
        }
        openChallenge(lvl);
      });
    }
    
    container.appendChild(node);
  });
  
  // Update header
  document.getElementById('levelDisplay').textContent = `${currentLevel}/30`;
  document.getElementById('starsDisplay').textContent = `⭐ ${totalStars}`;
  document.getElementById('progressBar').style.width = `${((currentLevel - 1) / 30) * 100}%`;
}

// ===== TOAST =====
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== CHALLENGE SYSTEM =====
function openChallenge(lvl) {
  const ch = challenges[lvl - 1];
  const modal = document.getElementById('challengeModal');
  const content = document.getElementById('challengeContent');
  
  const diffLabel = lvl <= 10 ? 'سهل' : lvl <= 20 ? 'متوسط' : 'صعب';
  const diffColor = lvl <= 10 ? '#00ffc8' : lvl <= 20 ? '#ffaa00' : '#ff4466';
  
  let html = `
    <div class="flex items-center justify-between mb-4">
      <div class="flex items-center gap-2">
        <span class="text-2xl">${ch.icon}</span>
        <div>
          <h3 class="font-bold text-lg" style="color:#e0e0ff;">المستوى ${lvl}</h3>
          <span class="text-xs font-bold px-2 py-1 rounded-full" style="color:${diffColor};background:${diffColor}15;border:1px solid ${diffColor}40;">${diffLabel} - ${ch.cat}</span>
        </div>
      </div>
      <button onclick="closeModal()" class="p-2 rounded-lg" style="background:rgba(100,100,160,0.2);border:1px solid rgba(100,100,160,0.3);cursor:pointer;">
        <i data-lucide="x" style="width:18px;height:18px;color:#c8c8e0;"></i>
      </button>
    </div>
    <p class="mb-4 text-base" style="color:rgba(200,200,224,0.8);">${ch.q}</p>
  `;
  
  switch(ch.type) {
    case 'quiz': html += renderQuiz(ch, lvl); break;
    case 'reaction': html += renderReaction(ch, lvl); break;
    case 'image_memory': html += renderImageMemory(ch, lvl); break;
    case 'memory_pairs': html += renderMemoryPairs(ch, lvl); break;
    case 'memory_grid': html += renderMemoryGrid(ch, lvl); break;
    case 'pattern': html += renderPattern(ch, lvl); break;
    case 'math': html += renderMath(ch, lvl); break;
    case 'speed_click': html += renderSpeedClick(ch, lvl); break;
    case 'word_scramble': html += renderWordScramble(ch, lvl); break;
    case 'future_vision': html += renderFutureVision(ch, lvl); break;
  }
  
  content.innerHTML = html;
  modal.classList.add('active');
  lucide.createIcons();
  
  // Initialize challenge-specific logic
  setTimeout(() => {
    switch(ch.type) {
      case 'reaction': initReaction(ch, lvl); break;
      case 'image_memory': initImageMemory(ch, lvl); break;
      case 'memory_pairs': initMemoryPairs(ch, lvl); break;
      case 'memory_grid': initMemoryGrid(ch, lvl); break;
      case 'pattern': initPattern(ch, lvl); break;
      case 'math': initMath(ch, lvl); break;
      case 'speed_click': initSpeedClick(ch, lvl); break;
      case 'word_scramble': initWordScramble(ch, lvl); break;
      case 'future_vision': initFutureVision(ch, lvl); break;
    }
  }, 100);
}

function closeModal() {
  document.getElementById('challengeModal').classList.remove('active');
  if (challengeTimer) { clearInterval(challengeTimer); challengeTimer = null; }
}

function completeLevel(lvl, stars) {
  const prevStars = levelStars[lvl] || 0;
  const actualStars = Math.max(prevStars, stars);
  const starDiff = actualStars - prevStars;
  
  levelStars[lvl] = actualStars;
  totalStars += starDiff;
  
  if (lvl === currentLevel && currentLevel <= 30) {
    currentLevel = Math.min(currentLevel + 1, 31);
  }
  
  saveProgress();
  
  setTimeout(() => {
    closeModal();
    if (currentLevel === 31) {
      showCelebration();
    } else {
      showToast(`أحسنت! حصلت على ${'⭐'.repeat(stars)}`, 'success');
      renderMap();
      // Scroll to current level
      setTimeout(() => scrollToCurrentLevel(), 300);
    }
  }, 1200);
}

function failLevel(lvl) {
  setTimeout(() => {
    showToast('حاول مرة أخرى!', 'error');
    closeModal();
  }, 800);
}

function scrollToCurrentLevel() {
  const currentNodes = document.querySelectorAll('.map-node.current');
  if (currentNodes.length > 0) {
    currentNodes[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
  } else {
    // If no current, scroll to the last completed
    const completedNodes = document.querySelectorAll('.map-node.completed');
    if (completedNodes.length > 0) {
      completedNodes[completedNodes.length - 1].scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }
}

// ===== QUIZ =====
function renderQuiz(ch, lvl) {
  let h = '<div class="flex flex-col gap-3" id="quizOptions">';
  ch.opts.forEach((opt, i) => {
    h += `<button class="option-btn" data-idx="${i}" onclick="checkQuiz(${lvl},${i},${ch.ans})">${opt}</button>`;
  });
  h += '</div>';
  h += `<div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>`;
  return h;
}

function checkQuiz(lvl, selected, correct) {
  const btns = document.querySelectorAll('#quizOptions .option-btn');
  btns.forEach(b => {
    b.style.pointerEvents = 'none';
    const idx = parseInt(b.dataset.idx);
    if (idx === correct) b.classList.add('correct');
    if (idx === selected && idx !== correct) b.classList.add('wrong');
  });
  
  if (selected === correct) {
    completeLevel(lvl, 3);
  } else {
    failLevel(lvl);
  }
}

// ===== REACTION =====
function renderReaction(ch, lvl) {
  return `
    <div id="reactionArea" style="position:relative;height:250px;border-radius:16px;background:rgba(10,10,30,0.5);border:1px solid rgba(100,100,160,0.2);overflow:hidden;">
      <div id="reactionStart" class="flex items-center justify-center h-full cursor-pointer" onclick="startReaction(${lvl})">
        <p class="text-lg font-bold" style="color:#00ffc8;">اضغط للبدء</p>
      </div>
    </div>
    <div class="flex justify-between mt-3">
      <span style="color:rgba(200,200,224,0.5);font-size:13px;">الأهداف: <span id="reactionCount">0</span>/${ch.targets}</span>
      <span style="color:rgba(200,200,224,0.5);font-size:13px;">الوقت: <span id="reactionTime">${ch.time}</span>ث</span>
    </div>
    <div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
  `;
}

let reactionData = {};
function initReaction(ch, lvl) { reactionData = { targets: ch.targets, time: ch.time, caught: 0, lvl }; }

function startReaction(lvl) {
  const area = document.getElementById('reactionArea');
  const startDiv = document.getElementById('reactionStart');
  if (startDiv) startDiv.remove();
  
  const ch = challenges[lvl - 1];
  reactionData = { targets: ch.targets, time: ch.time, caught: 0, lvl, startTime: Date.now() };
  
  spawnTarget();
  
  let timeLeft = ch.time;
  const fill = document.getElementById('timerFill');
  challengeTimer = setInterval(() => {
    timeLeft -= 0.1;
    fill.style.width = (timeLeft / ch.time * 100) + '%';
    document.getElementById('reactionTime').textContent = Math.max(0, timeLeft).toFixed(1);
    if (timeLeft <= 0) {
      clearInterval(challengeTimer);
      failLevel(lvl);
    }
  }, 100);
}

function spawnTarget() {
  const area = document.getElementById('reactionArea');
  if (!area) return;
  const existing = area.querySelector('.reaction-target');
  if (existing) existing.remove();
  
  const t = document.createElement('div');
  t.className = 'reaction-target';
  t.style.left = (10 + Math.random() * 60) + '%';
  t.style.top = (10 + Math.random() * 50) + '%';
  t.addEventListener('click', () => {
    reactionData.caught++;
    document.getElementById('reactionCount').textContent = reactionData.caught;
    t.remove();
    if (reactionData.caught >= reactionData.targets) {
      clearInterval(challengeTimer);
      const elapsed = (Date.now() - reactionData.startTime) / 1000;
      const stars = elapsed < reactionData.time * 0.4 ? 3 : elapsed < reactionData.time * 0.7 ? 2 : 1;
      completeLevel(reactionData.lvl, stars);
    } else {
      setTimeout(spawnTarget, 200 + Math.random() * 400);
    }
  });
  area.appendChild(t);
}

// ===== IMAGE MEMORY =====
function renderImageMemory(ch, lvl) {
  const emojis = ['🌟','🎮','🚀','🎸','🍕','🎨','⚽','🐱','🌈','🎪','🎭','🎯'];
  let cards = '<div class="flex flex-wrap gap-3 justify-center" id="imageGrid" style="max-width:280px;margin:0 auto;">';

    <div class="timer-bar mt-3"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>

let imageMemoryData = {};
function initImageMemory(ch, lvl) {
  const emojis = ['🌟','🎮','🚀','🎸','🍕','🎨','⚽','🐱','🌈','🎪','🎭','🎯'];
  const selectedEmojis = emojis.slice(0, ch.imagesCount);
  const pairs = [...selectedEmojis, ...selectedEmojis];
  pairs.sort(() => Math.random() - 0.5);
  
  imageMemoryData = {
    pairs,
    flipped: [],
    matched: [],
    lvl,
    matchedPairs: 0,
    totalPairs: ch.imagesCount,
    time: ch.time
  };
  
  // Set emojis on cards
  document.querySelectorAll('#imageGrid .memory-card').forEach((card, i) => {
    card.querySelector('.image-emoji').textContent = pairs[i];
  });
  
  // Show all initially
  document.querySelectorAll('#imageGrid .image-emoji').forEach(e => {
    e.style.display = 'block';
  });
  document.querySelectorAll('#imageGrid .memory-card').forEach(c => c.style.pointerEvents = 'none');
  
  document.getElementById('imageStatus').textContent = 'انتظر وافحص الصور...';
  document.getElementById('imageStatus').style.color = '#ffaa00';
  
  setTimeout(() => {
    document.querySelectorAll('#imageGrid .image-emoji').forEach(e => {
      e.style.display = 'none';
    });
    document.querySelectorAll('#imageGrid .memory-card').forEach(c => c.style.pointerEvents = 'auto');
    document.getElementById('imageStatus').textContent = 'ابحث عن الأزواج المتطابقة!';
    document.getElementById('imageStatus').style.color = '#00ffc8';
  }, 3000);
  
  // Timer
  let timeLeft = ch.time;
  const fill = document.getElementById('timerFill');
  challengeTimer = setInterval(() => {
    timeLeft -= 0.1;
    fill.style.width = (timeLeft / ch.time * 100) + '%';
    if (timeLeft <= 0) {
      clearInterval(challengeTimer);
      failLevel(lvl);
    }
  }, 100);
}

function imageFlip(idx) {
  if (imageMemoryData.flipped.length >= 2 || imageMemoryData.matched.includes(idx) || imageMemoryData.flipped.includes(idx)) return;
  
  const card = document.querySelectorAll('#imageGrid .memory-card')[idx];
  card.classList.add('flipped');
  card.querySelector('.image-emoji').style.display = 'block';
  imageMemoryData.flipped.push(idx);
  
  if (imageMemoryData.flipped.length === 2) {
    const [first, second] = imageMemoryData.flipped;
    const match = imageMemoryData.pairs[first] === imageMemoryData.pairs[second];
    
    setTimeout(() => {
      if (match) {
        imageMemoryData.matched.push(first, second);
        imageMemoryData.matchedPairs++;
        document.getElementById('imageMatched').textContent = imageMemoryData.matchedPairs;
        
        if (imageMemoryData.matchedPairs === imageMemoryData.totalPairs) {
          clearInterval(challengeTimer);
          document.getElementById('imageStatus').textContent = 'ممتاز! وجدت كل الصور ✓';
          document.getElementById('imageStatus').style.color = '#00ffc8';
          completeLevel(imageMemoryData.lvl, 3);
        }
      } else {
        document.querySelectorAll('#imageGrid .memory-card')[first].classList.remove('flipped');
        document.querySelectorAll('#imageGrid .memory-card')[second].classList.remove('flipped');
        document.querySelectorAll('#imageGrid .memory-card')[first].querySelector('.image-emoji').style.display = 'none';
        document.querySelectorAll('#imageGrid .memory-card')[second].querySelector('.image-emoji').style.display = 'none';
      }
      imageMemoryData.flipped = [];
    }, 800);
  }
}
// ===== MEMORY PAIRS =====

function flipCard(idx) {
  if (pairsData.flipped.length >= 2 || pairsData.matched.includes(idx) || pairsData.flipped.includes(idx)) return;
  
  const card = document.querySelectorAll('.memory-card')[idx];
  card.classList.add('flipped');
  card.querySelector('.emoji').style.display = 'block';
  pairsData.flipped.push(idx);
  
  if (pairsData.flipped.length === 2) {
    const [first, second] = pairsData.flipped;
    const match = pairsData.pairs[first] === pairsData.pairs[second];
    
    setTimeout(() => {
      if (match) {
        pairsData.matched.push(first, second);
        pairsData.matchedPairs++;
        document.getElementById('matchedCount').textContent = pairsData.matchedPairs;
        
          if (pairsData.matchedPairs === pairsData.totalPairs) {
          clearInterval(challengeTimer);
          document.getElementById('pairsStatus').textContent = 'ممتاز! وجدت كل الأزواج ✓';
          document.getElementById('pairsStatus').style.color = '#00ffc8';
          const stars = 3;
          completeLevel(pairsData.lvl, stars);
        }
      } else {
        document.querySelectorAll('.memory-card')[first].classList.remove('flipped');
        document.querySelectorAll('.memory-card')[second].classList.remove('flipped');
        document.querySelectorAll('.memory-card')[first].querySelector('.emoji').style.display = 'none';
        document.querySelectorAll('.memory-card')[second].querySelector('.emoji').style.display = 'none';
      }
      pairsData.flipped = [];
    }, 800);
  }
}

function renderPattern(ch, lvl) {

  for (let i = 0; i < ch.gridSize * ch.gridSize; i++) {

  }
  grid += '</div>';

    <div class="timer-bar mt-3"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
  `;
}

let patternData = {};
function initPattern(ch, lvl) {
  const total = ch.gridSize * ch.gridSize;
  const cells = [];
  while (cells.length < ch.patternCount) {
    const r = Math.floor(Math.random() * total);
    if (!cells.includes(r)) cells.push(r);
  }
  patternData = { pattern: cells, input: [], lvl, phase: 'show', gridSize: ch.gridSize };
  
  // Show pattern
  cells.forEach(c => {
    document.querySelector(`.pattern-cell[data-idx="${c}"]`).classList.add('show');
  });
  
  document.querySelectorAll('.pattern-cell').forEach(c => c.style.pointerEvents = 'none');
  
  setTimeout(() => {
    document.querySelectorAll('.pattern-cell').forEach(c => {
      c.classList.remove('show');
      c.style.pointerEvents = 'auto';
    });
    patternData.phase = 'input';
    document.getElementById('patternStatus').textContent = 'أعد رسم النمط!';
    document.getElementById('patternStatus').style.color = '#00ffc8';
  }, 2000 + ch.patternCount * 300);
}

function patternClick(idx) {
  if (patternData.phase !== 'input') return;
  const cell = document.querySelector(`.pattern-cell[data-idx="${idx}"]`);
  
  if (cell.classList.contains('active')) {
    cell.classList.remove('active');
    patternData.input = patternData.input.filter(i => i !== idx);
  } else {
    cell.classList.add('active');
    patternData.input.push(idx);
  }
  
  if (patternData.input.length === patternData.pattern.length) {
    // Check
    const correct = patternData.pattern.every(p => patternData.input.includes(p));
    if (correct) {
      document.getElementById('patternStatus').textContent = 'صحيح! ✓';
      document.getElementById('patternStatus').style.color = '#00ffc8';
      const stars = patternData.pattern.length >= 7 ? 3 : patternData.pattern.length >= 5 ? 2 : 1;
      completeLevel(patternData.lvl, stars);
    } else {
      document.getElementById('patternStatus').textContent = 'خطأ! ✗';
      document.getElementById('patternStatus').style.color = '#ff4466';
      // Show correct pattern
      patternData.pattern.forEach(c => {
        document.querySelector(`.pattern-cell[data-idx="${c}"]`).classList.add('show');
      });
      failLevel(patternData.lvl);
    }
  }
}

  return `
    <div id="mathProblem" class="text-center mb-6">

      <div class="flex flex-wrap gap-3 justify-center" id="mathOptions"></div>
    </div>
    <div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
  `;
}

function initMath(ch, lvl) {
  let a, b, op, answer;
  const diff = lvl <= 10 ? 'easy' : lvl <= 20 ? 'medium' : 'hard';
  
  if (diff === 'easy') {
    a = 5 + Math.floor(Math.random() * 20);
    b = 2 + Math.floor(Math.random() * 15);
    op = '+';
    answer = a + b;
  } else if (diff === 'medium') {
    a = 3 + Math.floor(Math.random() * 12);
    b = 2 + Math.floor(Math.random() * 8);
    op = '×';
    answer = a * b;
  } else {
    a = 10 + Math.floor(Math.random() * 20);
    b = 5 + Math.floor(Math.random() * 12);
    op = '×';
    answer = a * b;
  }
  
  document.getElementById('mathExpression').textContent = `${a} ${op} ${b} = ?`;
  
  // Generate options with better variety
  const opts = [answer];
  const range = Math.max(10, answer * 0.3);
  while (opts.length < 4) {
    const offset = Math.floor((Math.random() - 0.5) * range * 2);
    const fake = answer + offset;
    if (fake !== answer && fake > 0 && !opts.includes(fake)) opts.push(fake);
  }
  opts.sort(() => Math.random() - 0.5);
  
  const container = document.getElementById('mathOptions');
  container.innerHTML = '';
  opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.style.width = 'auto';
    btn.style.minWidth = '80px';
    btn.style.textAlign = 'center';
    btn.style.fontFamily = "'Orbitron', sans-serif";
    btn.textContent = o;
    btn.addEventListener('click', () => {
      container.querySelectorAll('.option-btn').forEach(b => {
        b.style.pointerEvents = 'none';
        if (parseInt(b.textContent) === answer) b.classList.add('correct');
      });
      if (o === answer) {
        btn.classList.add('correct');
        completeLevel(lvl, 3);
      } else {
        btn.classList.add('wrong');
        failLevel(lvl);
      }
    });
    container.appendChild(btn);
  });
  
  // Timer
  let timeLeft = ch.time;
  const fill = document.getElementById('timerFill');
  challengeTimer = setInterval(() => {
    timeLeft -= 0.1;
    fill.style.width = (timeLeft / ch.time * 100) + '%';
    if (timeLeft <= 0) {
      clearInterval(challengeTimer);
      failLevel(lvl);
    }
  }, 100);
}

function renderWordScramble(ch, lvl) {
  return `
    <div id="wordArea" class="text-center">
      <div id="letterBoxes" class="flex flex-wrap gap-2 justify-center mb-6"></div>
      <div id="scrambledLetters" class="flex flex-wrap gap-2 justify-center mb-4"></div>
      <button id="wordClear" class="px-4 py-2 rounded-lg text-sm font-bold" style="background:rgba(255,68,102,0.15);border:1px solid rgba(255,68,102,0.3);color:#ff4466;cursor:pointer;" onclick="clearWordInput()">مسح</button>
    </div>

let wordData = {};
function initWordScramble(ch, lvl) {
  const word = ch.word;
  const letters = word.split('');
  const scrambled = [...letters].sort(() => Math.random() - 0.5);
  wordData = { word, input: [], scrambled, usedIndices: [], lvl };
  
  // Create letter boxes
  const boxes = document.getElementById('letterBoxes');
  boxes.innerHTML = '';
  for (let i = 0; i < word.length; i++) {
    const box = document.createElement('div');
    box.className = 'letter-box';
    box.id = `lb-${i}`;
    boxes.appendChild(box);
  }
  
  // Create scrambled letters
  const sLetters = document.getElementById('scrambledLetters');
  sLetters.innerHTML = '';
  scrambled.forEach((l, i) => {
    const btn = document.createElement('button');
    btn.className = 'seq-btn';
    btn.style.width = '44px';
    btn.style.height = '52px';
    btn.style.fontSize = '20px';
    btn.textContent = l;
    btn.id = `sl-${i}`;
    btn.addEventListener('click', () => selectLetter(i, l));
    sLetters.appendChild(btn);
  });
  
  // Timer
  let timeLeft = ch.time;
  const fill = document.getElementById('timerFill');
  challengeTimer = setInterval(() => {
    timeLeft -= 0.1;
    fill.style.width = (timeLeft / ch.time * 100) + '%';
    if (timeLeft <= 0) {
      clearInterval(challengeTimer);
      failLevel(lvl);
    }
  }, 100);
}

function selectLetter(idx, letter) {
  if (wordData.usedIndices.includes(idx)) return;
  wordData.usedIndices.push(idx);
  wordData.input.push(letter);
  
  const pos = wordData.input.length - 1;
  const box = document.getElementById(`lb-${pos}`);
  box.textContent = letter;
  box.classList.add('filled');
  
  const btn = document.getElementById(`sl-${idx}`);
  btn.style.opacity = '0.3';
  btn.style.pointerEvents = 'none';
  
  if (wordData.input.length === wordData.word.length) {
    const attempt = wordData.input.join('');
    if (attempt === wordData.word) {
      for (let i = 0; i < wordData.word.length; i++) {
        document.getElementById(`lb-${i}`).classList.add('correct-letter');
      }
      clearInterval(challengeTimer);
      completeLevel(wordData.lvl, 3);
    } else {
      for (let i = 0; i < wordData.word.length; i++) {
        document.getElementById(`lb-${i}`).classList.add('wrong-letter');
      }
      clearInterval(challengeTimer);
      failLevel(wordData.lvl);
    }
  }
}

function clearWordInput() {
  wordData.input = [];
  wordData.usedIndices = [];
  for (let i = 0; i < wordData.word.length; i++) {
    const box = document.getElementById(`lb-${i}`);
    box.textContent = '';
    box.className = 'letter-box';
  }
  wordData.scrambled.forEach((_, i) => {
    const btn = document.getElementById(`sl-${i}`);
    btn.style.opacity = '1';
    btn.style.pointerEvents = 'auto';
  });
}

let isMapDragging = false;
const mapView = document.getElementById('mapView');
if (mapView) {
  mapView.style.cursor = 'grab';
  let isDragging = false;
  let dragged = false;
  let startX = 0;
  let startY = 0;
  let startScrollLeft = 0;
  let startScrollTop = 0;

  mapView.addEventListener('mousedown', (e) => {
    isDragging = true;
    isMapDragging = false;
    mapView.style.cursor = 'grabbing';
    startX = e.clientX;
    startY = e.clientY;
    startScrollLeft = mapView.scrollLeft;
    startScrollTop = mapView.scrollTop;
    mapView.style.userSelect = 'none';
    e.preventDefault();
  });

  mapView.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
      isMapDragging = true;
    }
    mapView.scrollLeft = startScrollLeft - dx;
    mapView.scrollTop = startScrollTop - dy;
  });

  window.addEventListener('mouseup', () => {
    if (!isDragging) return;
    isDragging = false;
    isMapDragging = false;
    mapView.style.cursor = 'grab';
    mapView.style.userSelect = '';
  });

  mapView.addEventListener('mouseleave', () => {
    if (!isDragging) return;
    isDragging = false;
    mapView.style.cursor = 'grab';
    mapView.style.userSelect = '';
  });
}

setTimeout(scrollToCurrentLevel, 500);
